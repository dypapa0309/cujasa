services:
  - type: web
    name: cujasa-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CLIENT_BASE_URL
        sync: false
      - key: LANDING_URL
        sync: false
      - key: BLOG_IMAGE_URL
        sync: false
      - key: THREADS_APP_ID
        sync: false
      - key: THREADS_APP_SECRET
        sync: false
      - key: THREADS_REDIRECT_URI
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: TOSS_BILLING_SECRET_KEY
        sync: false
      - key: COUPANG_ACCESS_KEY
        sync: false
      - key: COUPANG_SECRET_KEY
        sync: false
      - key: COUPANG_PARTNER_ID
        sync: false
      - key: COUPANG_TRACKING_CODE
        sync: false
      - key: MOCK_UPLOAD
        value: "false"
      - key: TRACKING_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: TRACKING_RATE_LIMIT_MAX
        value: "120"
      - key: INQUIRY_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: INQUIRY_RATE_LIMIT_MAX
        value: "5"
      - key: PUBLIC_CHECKOUT_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: PUBLIC_CHECKOUT_RATE_LIMIT_MAX
        value: "10"
      - key: COUPANG_KEYWORDS_PER_TOPIC
        value: "1"
      - key: COUPANG_ACCOUNT_SEARCH_INTERVAL_MS
        value: "90000"
      - key: COUPANG_SEARCH_RESULT_LIMIT
        value: "10"
      - key: COUPANG_REPAIR_ATTEMPT_LIMIT
        value: "0"
      - key: COUPANG_REPAIR_KEYWORDS_PER_ATTEMPT
        value: "1"
      - key: THREADS_REPLY_LINK_MODE_ENABLED
        value: "false"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
