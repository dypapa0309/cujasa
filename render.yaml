services:
  - type: web
    name: cujasa-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: NAVER_SEARCH_CLIENT_ID
        sync: false
      - key: NAVER_SEARCH_CLIENT_SECRET
        sync: false
      - key: NAVER_SEARCH_VALIDATION_RANGE
        value: "100"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DB_REQUEST_TIMEOUT_MS
        value: "5000"
      - key: DB_CIRCUIT_BREAKER_MS
        value: "60000"
      - key: AUTH_DEVICE_TIMEOUT_MS
        value: "3000"
      - key: SUPABASE_STORAGE_BUCKET
        value: auvibot-assets
      - key: SUPABASE_PUBLIC_ASSET_URL
        value: https://mkdvxofnnvyjuevqwfyb.supabase.co/storage/v1/object/public/auvibot-assets
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.cache/ms-playwright
      - key: VIRAL_CAPTURE_USE_BROWSER
        value: "false"
      - key: POLIBOT_STORAGE_BUCKET
        value: polibot-knowledge
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SCHEDULER_SECRET
        sync: false
      - key: IP_HASH_SALT
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CLIENT_BASE_URL
        sync: false
      - key: LANDING_URL
        sync: false
      - key: STORE_URL
        sync: false
      - key: BLOG_IMAGE_URL
        sync: false
      - key: THREADS_APP_ID
        sync: false
      - key: THREADS_APP_SECRET
        sync: false
      - key: THREADS_REDIRECT_URI
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: TOSS_BILLING_SECRET_KEY
        sync: false
      - key: COUPANG_ACCESS_KEY
        sync: false
      - key: COUPANG_SECRET_KEY
        sync: false
      - key: COUPANG_PARTNER_ID
        sync: false
      - key: COUPANG_TRACKING_CODE
        sync: false
      - key: MOCK_UPLOAD
        value: "false"
      - key: TRACKING_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: TRACKING_RATE_LIMIT_MAX
        value: "120"
      - key: INQUIRY_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: INQUIRY_RATE_LIMIT_MAX
        value: "5"
      - key: PUBLIC_CHECKOUT_RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: PUBLIC_CHECKOUT_RATE_LIMIT_MAX
        value: "10"
      - key: COUPANG_KEYWORDS_PER_TOPIC
        value: "1"
      - key: COUPANG_ACCOUNT_SEARCH_INTERVAL_MS
        value: "90000"
      - key: COUPANG_SEARCH_RESULT_LIMIT
        value: "10"
      - key: COUPANG_REPAIR_ATTEMPT_LIMIT
        value: "0"
      - key: COUPANG_REPAIR_KEYWORDS_PER_ATTEMPT
        value: "1"
      - key: THREADS_REPLY_LINK_MODE_ENABLED
        value: "true"
      - key: ENABLE_INTERNAL_DAILY_PIPELINE_CRON
        value: "false"
      - key: ENABLE_STARTUP_DAILY_CATCH_UP
        value: "false"
      - key: INFLUDEX_SERVICE_OPEN
        value: "true"
      - key: APIFY_API_TOKEN
        sync: false
      - key: THREADS_COUPANG_LINK_MODE
        value: direct
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
      - key: SUPPORT_PHONE_DISPLAY
        sync: false
      - key: SUPPORT_PHONE_TEL
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false

  - type: cron
    name: cujasa-daily-pipeline
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --prefix server
    startCommand: npm run scheduler:daily --prefix server
    schedule: "0 17 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER_API_BASE_URL
        value: https://api.jasain.kr
      - key: SCHEDULER_SECRET
        sync: false

  - type: cron
    name: cujasa-daily-pipeline-continuation
    env: node
    plan: starter
    rootDir: .
    buildCommand: npm install --prefix server
    startCommand: npm run scheduler:daily --prefix server
    schedule: "30 17-21 * * *"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCHEDULER_API_BASE_URL
        value: https://api.jasain.kr
      - key: SCHEDULER_SECRET
        sync: false
      - key: SCHEDULER_MODE
        value: continuation
      - key: SCHEDULER_TRIGGERED_BY
        value: render_cron_continuation
