<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEXOR — JASAIN</title>
    <meta name="description" content="JASAIN의 DEXOR 블로그 분석 및 선정 자동화 솔루션" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              jasain: '#2563eb',
              dexor: '#2f6fed'
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-slate-950 text-white">
    <main class="min-h-screen">
      <section class="mx-auto grid min-h-screen max-w-6xl content-center gap-12 px-6 py-16 lg:grid-cols-[1fr_0.9fr] lg:items-center">
        <div>
          <a href="/" class="text-sm font-black tracking-[0.2em] text-blue-200">JASAIN</a>
          <h1 class="mt-6 text-5xl font-black leading-tight tracking-normal sm:text-6xl">DEXOR</h1>
          <p class="mt-5 max-w-xl text-xl font-semibold leading-relaxed text-slate-200">
            블로그 분석, 선정, 운영 데이터를 한 계정에서 관리하는 JASAIN 제품입니다.
          </p>
          <p class="mt-4 max-w-xl text-base leading-7 text-slate-400">
            JASAIN 계정 안에서 DEXOR를 제공하고 있습니다. 회원가입하고 바로 사용해보세요.
          </p>
          <div class="mt-8 flex flex-wrap gap-3">
            <a href="https://app.jasain.kr/?mode=register&product=dexor" class="rounded-lg bg-dexor px-5 py-3 text-sm font-black text-white transition hover:bg-blue-600">DEXOR 사용하기</a>
            <a href="/" class="rounded-lg border border-white/20 px-5 py-3 text-sm font-black text-slate-100 transition hover:bg-white/10">JASAIN 홈</a>
          </div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-white/5 p-6 shadow-2xl">
          <div class="grid gap-3">
            <div class="rounded-xl bg-white p-5 text-slate-900">
              <div class="text-xs font-black text-dexor">ANALYSIS</div>
              <div class="mt-3 h-3 w-3/4 rounded bg-slate-200"></div>
              <div class="mt-3 h-3 w-1/2 rounded bg-slate-100"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="rounded-xl bg-blue-500 p-5">
                <div class="text-3xl font-black">JASAIN</div>
                <div class="mt-2 text-sm text-blue-100">통합 계정</div>
              </div>
              <div class="rounded-xl bg-slate-800 p-5">
                <div class="text-3xl font-black">DEXOR</div>
                <div class="mt-2 text-sm text-slate-300">제품 권한</div>
              </div>
            </div>
            <div class="rounded-xl bg-white/10 p-5">
              <div class="h-2 w-full rounded bg-white/20"></div>
              <div class="mt-3 h-2 w-4/5 rounded bg-white/20"></div>
              <div class="mt-3 h-2 w-2/3 rounded bg-white/20"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="https://api.jasain.kr/support/widget.js" data-product="dexor"></script>
  </body>
</html>
